name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # triggers on tags like v1.0.0, v1.2.3

# Never cancel an in-progress publish — partial publishes are hard to recover from
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed to create the GitHub Release
  packages: write  # needed to push to GitHub Packages

jobs:
  publish:
    name: Publish Maven artifacts & create GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (full history so we can walk back to the previous tag) ───
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # required to resolve previous tag for changelog

      # ── JDK ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 17

      # ── Swap space (avoids OOM on free runners with large Gradle daemons) ──
      - name: Expand swap space to 8 GB
        uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c # v1.0
        with:
          swap-size-gb: 8

      # ── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Extract version from tag (strips leading "v") ─────────────────────
      - name: Derive release version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Sync version into libs.versions.toml from the tag ────────────────
      # The TOML is the single source of truth. Both the plugin resolution
      # (libs.plugins.kautoservice version) and the module version() call
      # (libs.versions.kautoservice.get()) read from here.
      - name: Patch version in libs.versions.toml
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          sed -i "s/^kautoservice = \".*\"/kautoservice = \"${VERSION}\"/" gradle/libs.versions.toml
          echo "Version set to: $(grep '^kautoservice' gradle/libs.versions.toml)"

      # ── Build changelog from commits since the previous tag ───────────────
      - name: Build changelog
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"

          # Find the most recent tag before this one; fall back to first commit
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
          else
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          echo "Collecting commits in range: $RANGE"

          # Format: "- <short-sha> <subject>" — exclude merge commits
          CHANGELOG=$(git log "$RANGE" --no-merges --pretty=format:"- %h %s" | head -100)
          [ -z "$CHANGELOG" ] && CHANGELOG="- No changes recorded"

          # Write to a temp file to safely handle multi-line content
          CHANGELOG_FILE=$(mktemp)
          {
            echo "## What's changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full diff:** [\`${PREVIOUS_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG})"
            fi
          } > "$CHANGELOG_FILE"

          echo "path=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"

      # ── Publish: annotations + compiler-plugin first, gradle-plugin last ──
      # The gradle-plugin's SubpluginArtifact references the compiler-plugin, so
      # annotations and compiler-plugin must land in the registry before the
      # gradle-plugin is configured by other modules.
      - name: Publish annotations and compiler plugin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew \
            :kautoservice-annotations:publish \
            :kautoservice-compiler-plugin:publish \
            --no-daemon \
            --stacktrace

      - name: Publish Gradle plugin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew \
            :kautoservice-gradle-plugin:publish \
            --no-daemon \
            --stacktrace

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta1 → pre-release
